# lightning.pytorch==2.1.1
seed_everything: 0
trainer:
  accelerator: gpu
  # accelerator: cpu
  strategy: auto
  devices: auto
  num_nodes: 1
  logger: True # will use tensorboardlogger
  callbacks:
    # - class_path: RichProgressBar
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: EarlyStopping 
      init_args:
        monitor: val/loss
        patience: 20
  max_epochs: 200
  check_val_every_n_epoch: 1
  log_every_n_steps: 1
  enable_checkpointing: true
  default_root_dir: <<path to >>
  
data:
  class_path: GenericMultiModalDataModule
  init_args:
    task: segmentation
    batch_size: 16
    # batch_size: 1
    num_workers: 8
    constant_scale: 
      S2L2A: 1
      # DEM: 1
    modalities:
      - S2L2A
      # - DEM
    dataset_bands: # what bands are in your data
      S2L2A:
        - BLUE
        - GREEN
        - RED
        - NIR_NARROW
        - SWIR_1
        - SWIR_2
      # DEM:
      #   - DEM
    output_bands: # which bands do you want to fine-tune
      S2L2A:
        - BLUE
        - GREEN
        - RED
        - NIR_NARROW
        - SWIR_1
        - SWIR_2
      # DEM:
      #   - DEM
    rgb_modality: RGB
    rgb_indices:
      - 0
      - 1
      - 2
    train_data_root:
      S2L2A: ../data/data_v3/train
    train_label_data_root: ../data/data_v3/train
    val_data_root:
      S2L2A: ../data/data_v3/val
    val_label_data_root: ../data/data_v3/val
    test_data_root:
      S2L2A: ../data/data_v3/val
    test_label_data_root: ../data/data_v3/val
    image_grep:
      S2L2A: "*_img.tif"    
    label_grep: "*_lab.tif"
    no_label_replace: -1
    no_data_replace: 0
    means: #TODO - check
      S2L2A: [
        530.1647429643898,
        798.664137050334,
        788.9290127562836,
        2558.942396063767,
        1774.444227123873,
        1101.935018300794,
      ]
    stds: #TODO - check
      S2L2A: [
        275.17493711717844,
        316.9247986961961,
        539.6066170066144,
        1625.0164464430488,
        1136.4428972983876,
        780.1759822579997,
      ]
    train_transform:
      - class_path: albumentations.RandomCrop
        init_args: {height: 256, width: 256}
      - class_path: albumentations.pytorch.transforms.ToTensorV2
    val_transform:
      - class_path: albumentations.CenterCrop
        init_args: {height: 224, width: 224}
      - class_path: albumentations.pytorch.transforms.ToTensorV2
    test_transform:
      - class_path: albumentations.CenterCrop
        init_args: {height: 224, width: 224}
      - class_path: albumentations.pytorch.transforms.ToTensorV2
    num_classes: 2

model:
  class_path: terratorch.tasks.SemanticSegmentationTask 
  init_args:
    model_args:
      backbone_pretrained: true
      backbone: terramind_v1_base
      # backbone_pretrain_img_size: 512 #TODO - check
      decoder_channels: 256 #TODO - check
      backbone_modalities:
        - S2L2A
        # - DEM
      backbone_merge_method: mean #TODO - check in source code what it's doing
      backbone_bands: {"S2L2A": [BLUE, GREEN, RED, NIR_NARROW, SWIR_1, SWIR_2]}
      # backbone_bands: {"S2L2A": [BLUE, GREEN, RED, NIR_NARROW, SWIR_1, SWIR_2], "DEM": [DEM]}
      # necks:
      #   - name: SelectIndices
      #     indices: [2, 5, 8, 11]
      #   - name: ReshapeTokensToImage
      #     remove_cls_token: False
      #   - name: LearnedInterpolateToPyramidal
      # decoder: UNetDecoder
      # decoder_channels: [512, 256, 128, 64]
      num_classes: 2
      head_dropout: 0.1
      decoder: FCNDecoder
      decoder_num_convs: 4
      head_channel_list:
        - 256
      necks:
        - name: SelectIndices
          indices:
            - -1
        - name: ReshapeTokensToImage
    # loss: {focal: 0.5, dice: 0.5}
    loss: dice
    # aux_heads:
    #   - name: aux_head
    #     decoder: FCNDecoder
    #     decoder_args:
    #       decoder_channels: 256
    #       decoder_in_index: -1
    #       decoder_num_convs: 2
    #       head_dropout: 0.1
    # aux_loss:
    #   aux_head: 1.0
    ignore_index: -1
    # class_weights: #TODO - check
    #   - 0.0003
    #   - 0.0733
    #   - 0.0209
    #   - 0.004
    freeze_backbone: false
    freeze_decoder: false
    model_factory: EncoderDecoderFactory
    tiled_inference_parameters: 
      h_crop: 256
      h_stride: 32
      w_crop: 256
      w_stride: 32
      average_patches: True
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 6.e-5
    weight_decay: 0.05
lr_scheduler:
  class_path: ReduceLROnPlateau
  init_args:
    monitor: val/loss