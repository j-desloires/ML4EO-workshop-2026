seed_everything: 0
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  logger: True # will use tensorboardlogger
  callbacks:
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: EarlyStopping 
      init_args:
        monitor: val/loss
        patience: 20
  max_epochs: 200
  check_val_every_n_epoch: 1
  log_every_n_steps: 1
  enable_checkpointing: true
  default_root_dir: ...
data:
  class_path: GenericMultiModalDataModule
  init_args:
    task: segmentation
    batch_size: 16
    num_workers: 8
    constant_scale: 
      RGB: 1
      DEM: 1
    modalities:
      - RGB
      - DEM
    dataset_bands: # what bands are in your data 
      RGB: 
        - RED
        - GREEN
        - BLUE
        - NIR_NARROW
      DEM:
        - DEM
    output_bands: # which bands do you want to fine-tune 
      RGB: 
        - RED
        - GREEN
        - BLUE
        # - NIR_NARROW
      DEM:
        - DEM
    rgb_modality: RGB
    rgb_indices:
      - 0
      - 1
      - 2
    train_data_root:
      RGB: ...
      DEM: ...
    train_label_data_root: ...
    val_data_root:
      RGB: ...
      DEM: ...
    val_label_data_root: ...
    test_data_root:
      RGB: ...
      DEM: ...
    test_label_data_root: ...
    image_grep:
      RGB: "*_img.tif"    
      DEM: "*_dtm.tif"    
    label_grep: "*_lab.tif"
    no_label_replace: -1
    no_data_replace: 0
    means: 
      RGB: [115.19354359729066, 118.86120546240689, 109.12759241561714]  # 3 bands: R,G,B only
      DEM: [2.735197109704771]  # 1 band: elevation
    stds: 
      RGB: [33.664398370098894, 28.304623270249305, 28.10635937087942]  # 3 bands: R,G,B only
      DEM: [3.4882057325526548]
    num_classes: 4

model:
  class_path: terratorch.tasks.SemanticSegmentationTask 
  init_args:
    model_args:
      backbone_pretrained: true
      backbone: terramind_v1_base
      decoder_channels: 256 
      backbone_modalities: 
        - RGB
        - DEM
      backbone_merge_method: mean 
      num_classes: 4
      head_dropout: 0.1
      decoder: FCNDecoder
      decoder_num_convs: 4
      head_channel_list:
        - 256
      necks:
        - name: SelectIndices
          indices:
            - -1
        - name: ReshapeTokensToImage
    loss: dice
    ignore_index: -1
    freeze_backbone: false
    freeze_decoder: false
    model_factory: EncoderDecoderFactory
    tiled_inference_parameters: 
      h_crop: 256
      h_stride: 32
      w_crop: 256
      w_stride: 32
      average_patches: True
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 6.e-5
    weight_decay: 0.05
lr_scheduler:
  class_path: ReduceLROnPlateau
  init_args:
    monitor: val/loss