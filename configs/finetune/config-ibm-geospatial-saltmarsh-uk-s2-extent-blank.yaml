seed_everything: 0
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  logger: True # will use tensorboardlogger
  callbacks:
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: EarlyStopping 
      init_args:
        monitor: val/loss
        patience: 20
  max_epochs: 200
  check_val_every_n_epoch: 1
  log_every_n_steps: 1
  enable_checkpointing: true
  default_root_dir: ...
  
data:
  class_path: GenericMultiModalDataModule
  init_args:
    task: segmentation
    batch_size: 16
    num_workers: 8
    constant_scale: 
      S2L2A: 1
      # DEM: 1 #example additional modality
    modalities:
      - S2L2A
      # - DEM 
    dataset_bands: # what bands are in your data
      S2L2A:
        - BLUE
        - GREEN
        - RED
        - NIR_NARROW
        - SWIR_1
        - SWIR_2
      # DEM:
        # - DEM
    output_bands: # which bands do you want to fine-tune
      S2L2A:
        - ...
      # DEM:
        # - DEM
    rgb_modality: RGB
    rgb_indices:
      - 0
      - 1
      - 2
    train_data_root:
      S2L2A: ...
      # DEM: ...
    train_label_data_root: ...
    val_data_root:
      S2L2A: ...
      # DEM: ...
    val_label_data_root: ...
    test_data_root:
      S2L2A: ...
      # DEM: ...
    test_label_data_root: ...
    image_grep:
      S2L2A: ...    
    label_grep: ...
    no_label_replace: -1
    no_data_replace: 0
    means: 
      S2L2A: [
        530.1647429643898,
        798.664137050334,
        788.9290127562836,
        2558.942396063767,
        1774.444227123873,
        1101.935018300794,
      ]
      # DEM: [7.02951132161297]  # 1 band: elevation
    stds: 
      S2L2A: [
        275.17493711717844,
        316.9247986961961,
        539.6066170066144,
        1625.0164464430488,
        1136.4428972983876,
        780.1759822579997,
      ]
      # DEM: [12.729338251901591]
    num_classes: ...

model:
  class_path: terratorch.tasks.SemanticSegmentationTask 
  init_args:
    model_args:
      backbone_pretrained: true
      backbone: terramind_v1_base
      decoder_channels: 256 
      backbone_modalities:
        - S2L2A
        # - DEM
      backbone_merge_method: mean 
      backbone_bands: {
        "S2L2A": [...], 
        # "DEM": [DEM]
        }
      num_classes: 2
      head_dropout: 0.1
      decoder: FCNDecoder
      decoder_num_convs: 4
      head_channel_list:
        - 256
      necks:
        - name: SelectIndices
          indices:
            - -1
        - name: ReshapeTokensToImage
    loss: dice
    ignore_index: -1
    freeze_backbone: false
    freeze_decoder: false
    model_factory: EncoderDecoderFactory
    tiled_inference_parameters: 
      h_crop: 256
      h_stride: 32
      w_crop: 256
      w_stride: 32
      average_patches: True
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 6.e-5
    weight_decay: 0.05
lr_scheduler:
  class_path: ReduceLROnPlateau
  init_args:
    monitor: val/loss